<!DOCTYPE html>
<html>
<head>
    <title>Список подій</title>
</head>
<body>
    <h1>Актуальні події</h1>
    <a href="{% url 'event_create' %}">＋ Додати нову подію</a>
    <hr>
    <ul>
        {% for event in events %}
            <li>
                <strong>{{ event.name }}</strong> — {{ event.price }} грн.
                <a href="{% url 'event_update' event.pk %}">Редагувати</a> | 
                <a href="{% url 'event_delete' event.pk %}" style="color:red;">Видалити</a>
            </li>
        {% empty %}
            <li>Подій поки немає.</li>
        {% endfor %}
    </ul>
    <div style="margin-bottom: 20px; padding: 10px; background-color: #f0f0f0;">
    {% if user.is_authenticated %}
        <span>Привіт, <strong>{{ user.username }}</strong>!</span>
        
        <form method="POST" action="{% url 'logout' %}" style="display:inline; margin-left: 15px;">
            {% csrf_token %}
            <button type="submit">Вийти з акаунта</button>
        </form>
        
    {% else %}
        <a href="{% url 'login' %}"><button>Увійти</button></a>
        <a href="{% url 'register' %}"><button>Зареєструватися</button></a>
    {% endif %}
</div>
<hr>
</body>
</html>
